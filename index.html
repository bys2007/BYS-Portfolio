    <!-- Language Redirection Script -->
    <script>
        (function() {
            var lang = localStorage.getItem('preferred-lang');
            if (!lang) {
                var userLang = navigator.language || navigator.userLanguage;
                if (userLang && userLang.toLowerCase().startsWith('id')) {
                    lang = 'id';
                } else {
                    lang = 'en';
                }
            }
            window.location.replace(lang + '.html' + window.location.hash);
        })();
    </script>
